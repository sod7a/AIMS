<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Masuk | Meja Bantuan</title>
    <link rel="icon" type="image/png" href="/static/img/aims_favicon.png">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body {
            margin: 0;
            display: flex;
            height: 100vh;
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            background-color: #ffffff;
        }

        .split-layout {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        /* Left Side */
        .left-side {
            flex: 0 0 55%; /* 55/45 split roughly matches the image */
            background-color: #123e2b; /* Dark green matching image */
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .jata-negara {
            position: absolute;
            top: 30px;
            left: 30px;
            height: 80px;
            width: auto;
        }

        .aims-logo {
            max-width: 418px;
            width: 88%;
        }

        /* Right Side */
        .right-side {
            flex: 1;
            background-color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
        }

        .login-title {
            color: #000000;
            font-weight: 700;
            font-size: 1.6rem;
            margin-bottom: 5px;
        }

        .login-subtitle {
            color: #4b5563;
            font-size: 0.95rem;
            margin-bottom: 35px;
        }

        .form-label {
            font-weight: 500;
            font-size: 0.85rem;
            color: #1f2937;
            margin-bottom: 8px;
        }

        .form-control {
            border: 1px solid #1a6f4d; /* Green border from image */
            background-color: #ffffff;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.95rem;
            color: #1f2937;
            margin-bottom: 20px;
        }

        .form-control::placeholder {
            color: #9ca3af;
        }

        .form-control:focus {
            border-color: #123e2b;
            box-shadow: 0 0 0 3px rgba(18, 62, 43, 0.1);
            outline: none;
        }

        .btn-login {
            background-color: #237452; /* Matching the button color in image */
            color: white;
            border: none;
            padding: 12px;
            font-weight: 600;
            border-radius: 25px; /* Pill shape */
            margin-top: 10px;
            width: 100%;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .btn-login:hover {
            background-color: #1a5a3f;
        }

        .btn-register {
            background-color: #ffffff;
            color: #237452;
            border: 1px solid #237452;
            padding: 12px;
            font-weight: 600;
            border-radius: 25px; /* Pill shape */
            margin-top: 15px;
            width: 100%;
            font-size: 0.95rem;
            display: block;
            text-align: center;
            text-decoration: none;
            transition: all 0.2s;
        }

        .btn-register:hover {
            background-color: #f0f9f5;
            color: #1a5a3f;
        }

        .divider {
            height: 1px;
            background-color: #f3f4f6;
            margin: 30px 0 20px 0;
            width: 100%;
        }

        .login-footer {
            text-align: center;
        }

        .login-footer a {
            font-size: 0.8rem;
            color: #6b7280;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .login-footer a:hover {
            color: #374151;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .split-layout {
                flex-direction: column;
            }
            .left-side {
                flex: 0 0 40%;
            }
            .right-side {
                flex: 1;
            }
            .jata-negara {
                top: 20px;
                left: 20px;
                height: 60px;
            }
            .aims-logo {
                max-width: 250px;
            }
        }
    </style>
</head>

<body>
    <div class="split-layout">
        <!-- Left Side (Dark Green) -->
        <div class="left-side">
            <img src="/static/img/LogoJata_new.png" alt="Jata Negara" class="jata-negara">
            <img src="/static/img/aims_logo_ghost.png" alt="AIMS Logo" class="aims-logo">
        </div>

        <!-- Right Side (White Form) -->
        <div class="right-side">
            <div class="login-container">
                <h3 class="login-title">Selamat Datang!</h3>
                <p class="login-subtitle">Sistem Meja Bantuan STM</p>

                <!-- Flash Messages -->
                {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                {% for category, message in messages %}
                <div class="alert alert-{{ category if category != 'error' else 'danger' }} alert-dismissible fade show" role="alert" style="font-size: 0.85rem; padding: 10px;">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close" style="padding: 12px;"></button>
                </div>
                {% endfor %}
                {% endif %}
                {% endwith %}

                <form action="{{ url_for('login') }}" method="POST">
                    <div>
                        <label for="username" class="form-label">Nama Pengguna</label>
                        <input type="text" class="form-control" id="username" name="username"
                            placeholder="Masukkan nama pengguna" required autocomplete="username" autofocus>
                    </div>

                    <div>
                        <label for="password" class="form-label">Kata Laluan</label>
                        <input type="password" class="form-control" id="password" name="password"
                            placeholder="Masukkan kata laluan" required autocomplete="current-password">
                    </div>

                    <button type="submit" class="btn btn-login">Log Masuk</button>

                    <a href="{{ url_for('register') }}" class="btn-register">
                        Daftar Akaun Baru
                    </a>

                    <div class="divider"></div>

                    <div class="login-footer">
                        <a href="#"><i class="bi bi-key"></i> Lupa kata laluan?</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
