{% extends "base.html" %}

{% block title %}Tukar Kata Laluan | Meja Bantuan STM{% endblock %}

{% block content %}
<div class="row mb-4 align-items-center">
    <div class="col">
        <h2 class="fw-bold mb-0">Tukar Kata Laluan</h2>
        <p class="text-muted">Kemaskini kata laluan akaun anda dengan selamat.</p>
    </div>
</div>

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white py-3 profile-card-header">
                <h5 class="m-0 fw-bold profile-header-text">
                    <i class="bi bi-shield-lock text-warning me-2"></i> Kemaskini Kata Laluan
                </h5>
            </div>
            <div class="card-body p-4">
                <form action="{{ url_for('change_password') }}" method="POST">

                    <!-- Old Password -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold profile-info-text">Kata Laluan Lama</label>
                        <div class="input-group">
                            <input type="password" name="old_password" id="old_password"
                                class="form-control border-0 shadow-sm" placeholder="Masukkan kata laluan semasa"
                                required>
                            <button class="btn btn-outline-secondary border-0 shadow-sm" type="button"
                                onclick="togglePwd('old_password', this)" tabindex="-1">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>

                    <!-- New Password -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold profile-info-text">Kata Laluan Baru</label>
                        <div class="input-group">
                            <input type="password" name="new_password" id="new_password"
                                class="form-control border-0 shadow-sm" placeholder="Masukkan kata laluan baru"
                                required>
                            <button class="btn btn-outline-secondary border-0 shadow-sm" type="button"
                                onclick="togglePwd('new_password', this)" tabindex="-1">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Confirm New Password -->
                    <div class="mb-4">
                        <label class="form-label fw-semibold profile-info-text">Sahkan Kata Laluan Baru</label>
                        <div class="input-group">
                            <input type="password" name="confirm_password" id="confirm_password"
                                class="form-control border-0 shadow-sm" placeholder="Ulangi kata laluan baru" required>
                            <button class="btn btn-outline-secondary border-0 shadow-sm" type="button"
                                onclick="togglePwd('confirm_password', this)" tabindex="-1">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between align-items-center">
                        <a href="{{ url_for('profile') }}" class="btn btn-outline-secondary rounded-pill px-4">
                            <i class="bi bi-arrow-left me-1"></i> Kembali
                        </a>
                        <button type="submit" class="btn btn-warning rounded-pill px-4 fw-semibold">
                            <i class="bi bi-key me-1"></i> Kemas Kini
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    function togglePwd(inputId, btn) {
        const input = document.getElementById(inputId);
        const icon = btn.querySelector('i');
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.replace('bi-eye', 'bi-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.replace('bi-eye-slash', 'bi-eye');
        }
    }
</script>
{% endblock %}
